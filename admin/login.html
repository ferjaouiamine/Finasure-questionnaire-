<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Connexion administration | Finasure</title><link rel="stylesheet" href="css/admin.css"></head><body class="login-page"><main class="login-card"><img src="../assets/logo-finasure.png" alt="Finasure"><h1>Espace administrateur</h1><p>Accès réservé aux utilisateurs autorisés.</p><form id="login-form"><label for="email">Adresse e-mail</label><input id="email" name="email" type="email" autocomplete="username" required><label for="password">Mot de passe</label><input id="password" name="password" type="password" autocomplete="current-password" required><button class="btn" type="submit">Se connecter</button><div id="login-error" class="login-error" role="alert"></div></form></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/supabase-config.js?v=20260723-1"></script><script src="../js/supabase-client.js?v=20260723-1"></script><script src="js/admin-auth.js"></script><script>document.querySelector("#login-form").addEventListener("submit",async e=>{e.preventDefault();const b=e.currentTarget.querySelector("button"),m=document.querySelector("#login-error");b.disabled=true;m.textContent="";try{await AdminAuth.login(e.currentTarget.email.value.trim(),e.currentTarget.password.value);const n=new URLSearchParams(location.search).get("next");location.replace(n&&/^[\\w-]+\\.html$/.test(n)?n:"index.html")}catch(x){m.textContent=x.message||"Connexion impossible."}finally{b.disabled=false}});</script></body></html>
